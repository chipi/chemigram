# Pre-commit hooks for Chemigram (ADR-039).
# Install once after cloning:
#     uv run pre-commit install
#     uv run pre-commit install --hook-type pre-push

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match the version uv installs from pyproject.toml's
    # [project.optional-dependencies] dev list (ruff>=0.6). When updating,
    # keep these in sync — drift causes pre-commit to reformat files
    # that CI's ruff version then rejects.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^src/chemigram/
        additional_dependencies: []

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: pytest-unit
        name: Fast unit tests
        entry: uv run pytest tests/unit -q
        language: system
        pass_filenames: false
        stages: [pre-push]
